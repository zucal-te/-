server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_interview?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  # 新增：解决LocalDateTime序列化异常（接口报错核心原因）
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

ai:
  model:
    api-key: sk-cc44f13e89204fd084be5f42e9f590b3
    api-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.interview.entity
  # 新增：打印SQL日志，方便排查数据库报错
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl